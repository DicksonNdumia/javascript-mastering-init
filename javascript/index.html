<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1" />
    <title>Javascript code testing</title>

</head>
<body>
<h1 >JavaScript code testing</h1>
<label>
    <input id="input" type="text" /> <br><br>

    <button id="button">Test</button>
</label>
<p id="output"></p>
<p id="demo"></p>
<p id="demo2">Hello I will Change color</p>
<button onclick="window.print()">Print this page</button>
<p id="demo3">Paragraph</p>

<!--<button type="button" onclick="document.write(5 + 6)">Try it</button>-->
<button type="button" onclick="myFunction()">Try</button>
<script>
    document.getElementById('button').onclick = function () {
      const  userName = document.getElementById('input').value;
       document.getElementById('output').textContent= `your user name is ${userName}`;

        //console.log(userName);
    }

    document.getElementById('demo').innerHTML = "Hello, from Javascript code testing!";
    document.getElementById('demo2').style.color='green' ;

    function myFunction() {
        document.getElementById('demo3').innerHTML = "I was changed";
    }


</script>
</body>
</html>
